name: Rentsplit
options:
  bundleIdPrefix: com.shimondeitel.rentsplit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Rentsplit:
    type: application
    platform: iOS
    sources:
      - path: Rentsplit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rentsplit
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Rentsplit/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RentsplitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RentsplitTests
      - path: Rentsplit.storekit
    dependencies:
      - target: Rentsplit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rentsplit.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RentsplitUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RentsplitUITests
    dependencies:
      - target: Rentsplit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rentsplit.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Rentsplit:
    build:
      targets:
        Rentsplit: all
        RentsplitTests: [test]
        RentsplitUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Rentsplit.storekit
    test:
      config: Debug
      storeKitConfiguration: Rentsplit.storekit
      targets:
        - RentsplitTests
        - RentsplitUITests
    archive:
      config: Release
